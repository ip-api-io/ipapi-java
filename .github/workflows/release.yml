name: release

# Builds the jar + sources + javadoc jars via the pom `release` profile (GPG
# signing skipped — that belongs to the later Maven Central deploy). On a v* tag
# the jars are also attached to a GitHub Release. No tokens are used here.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B -P release package -Dgpg.skip=true
      - uses: actions/upload-artifact@v4
        with:
          name: java-package
          path: target/*.jar
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" target/*.jar --title "$GITHUB_REF_NAME" --generate-notes \
            || gh release upload "$GITHUB_REF_NAME" target/*.jar --clobber
